                        <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>

    <!-- SCRIPT CORRIGIDO E ISOLADO -->
    <script>
        // ==========================================
        // CONFIGURAÇÕES GERAIS DA PÁGINA
        // ==========================================
        const BASE_URL = 'https://classificados.criadordeanuncio.com';
        
        // Defina a base da URL para o botão "Mais detalhes". 
        // O sistema adicionará a variável "id_pasta" automaticamente ao final do link (ex: /classificado01)
        const BASE_URL_DETALHES = 'https://classificado.xx.com';
        
        // ==========================================
        // LINKS DAS REDES SOCIAIS E CONTATO
        // Preencha apenas aqui! O site todo será atualizado automaticamente.
        // ==========================================
        const CONFIG_LINKS = {
            facebook: 'https://facebook.com/criadordeanuncio.veiculo',
            instagram: 'https://instagram.com/criadordeanuncio.veiculo',
            google: 'https://g.page/3498394343',
            whatsapp: 'https://wa.me/5543991228540'
        };
        
        /* * VARIÁVEIS DOS CLASSIFICADOS
        * Aqui você adiciona todos os anúncios. O script vai filtrá-los pelos mais recentes automaticamente.
        * Pode adicionar 1 ou 1000. O layout se ajustará.
        */
        const listaClassificados = [
            {
                id_pasta: 'classificado01', // Nome da pasta (ex: /classificado01/)
                nome_classificado: 'Carro Esportivo Modelo X',
                numero_whatsapp: '5511999999999', // Apenas números, com DDI (55 para Brasil)
                quantidade_fotos: 4, // Quantas fotos existem (image01.png, image02.png...)
                data_publicacao: '2026-03-29T10:00:00Z' // Formato ISO para organizar por data
            },
            {
                id_pasta: 'classificado02',
                nome_classificado: 'Apartamento Centro 3 Quartos',
                numero_whatsapp: '5511888888888',
                quantidade_fotos: 2,
                data_publicacao: '2026-03-28T15:30:00Z'
            },
            {
                id_pasta: 'classificado03',
                nome_classificado: 'iPhone 15 Pro Max 256GB',
                numero_whatsapp: '5511777777777',
                quantidade_fotos: 5,
                data_publicacao: '2026-03-29T14:20:00Z'
            },
            // ADICIONE NOVOS CLASSIFICADOS AQUI EMBAIXO:
            {
                id_pasta: 'classificado04',
                nome_classificado: 'Notebook Gamer RTX 4060',
                numero_whatsapp: '5511666666666',
                quantidade_fotos: 3,
                data_publicacao: '2026-03-25T09:00:00Z'
            }
        ];

        // ==========================================
        // LÓGICA PRINCIPAL DO SISTEMA
        // ==========================================

        // Ordena os classificados do mais recente para o mais antigo
        const classificadosOrdenados = listaClassificados.sort((a, b) => {
            return new Date(b.data_publicacao) - new Date(a.data_publicacao);
        });

        // Estado do Modal (Carrossel)
        let anuncioAtual = null;
        let indiceImagemAtual = 1;

        // Inicia a renderização quando a página carrega
        document.addEventListener('DOMContentLoaded', () => {
            renderizarGrid();
            configurarLinksSociais();
        });

        // Função para injetar os links nas redes sociais em todos os botões da página
        function configurarLinksSociais() {
            document.querySelectorAll('.btn-facebook').forEach(el => el.href = CONFIG_LINKS.facebook);
            document.querySelectorAll('.btn-instagram').forEach(el => el.href = CONFIG_LINKS.instagram);
            document.querySelectorAll('.btn-google').forEach(el => el.href = CONFIG_LINKS.google);
            document.querySelectorAll('.btn-whatsapp').forEach(el => el.href = CONFIG_LINKS.whatsapp);
        }

        // Função para montar o link do WhatsApp
        function gerarLinkWhatsapp(numero_whatsapp, nome_classificado, id_pasta) {
            const linkImagemPrincipal = `${BASE_URL}/${id_pasta}/image01.png`;
            const mensagem = `Olá, gostaria de mais detalhes do classificado do "${nome_classificado}"!\n\nVeja o anúncio aqui: ${linkImagemPrincipal}`;
            return `https://api.whatsapp.com/send?phone=${numero_whatsapp}&text=${encodeURIComponent(mensagem)}`;
        }

        // Função para criar a URL da imagem baseada no padrão exigido
        function obterUrlImagem(pasta, indice) {
            // Formata o número com 2 dígitos (ex: 1 vira '01', 2 vira '02')
            const numeroFormatado = indice.toString().padStart(2, '0');
            return `${BASE_URL}/${pasta}/image${numeroFormatado}.png`;
        }

        // Renderiza os anúncios no Grid principal
        function renderizarGrid() {
            const grid = document.getElementById('grid-classificados');
            grid.innerHTML = ''; // Limpa antes de renderizar

            classificadosOrdenados.forEach((anuncio, index) => {
                const imagemPrincipalUrl = obterUrlImagem(anuncio.id_pasta, 1);
                const linkWhats = gerarLinkWhatsapp(anuncio.numero_whatsapp, anuncio.nome_classificado, anuncio.id_pasta);
                
                // Lógica de Visualizações com LocalStorage
                const storageKey = `views_${anuncio.id_pasta}`;
                let visualizacoes = localStorage.getItem(storageKey);
                
                if (!visualizacoes) {
                    // Se for a primeira vez que o usuário entra, gera um número aleatório
                    visualizacoes = Math.floor(Math.random() * (950 - 150 + 1)) + 150;
                    localStorage.setItem(storageKey, visualizacoes);
                }

                const cardHTML = `
                    <div class="group relative overflow-hidden rounded-2xl shadow-md hover:shadow-2xl transition-all duration-500 aspect-[4/5] bg-gray-200 border border-gray-100">
                        
                        <!-- Prova Social Badge (Visualizações) com efeito de sumir no hover -->
                        <div class="absolute top-3 left-3 z-20 bg-black/70 backdrop-blur-md text-white text-[11px] sm:text-xs font-semibold px-2.5 py-1.5 rounded-full flex items-center gap-1.5 shadow-lg transition-opacity duration-300 group-hover:opacity-0">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            <span id="view-count-${anuncio.id_pasta}" class="transition-colors duration-300 inline-block">${visualizacoes}</span> visualizações
                        </div>

                        <!-- Imagem Principal (Lazy Loading e Fallbacks aplicados) -->
                        <img src="${imagemPrincipalUrl}" 
                            loading="lazy"
                            onerror="this.src='https://images.unsplash.com/photo-1555661530-68c8e98db4e6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1080&q=80'" 
                            alt="Classificado" 
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        
                        <!-- Overlay Escuro no Hover (Ações centralizadas) -->
                        <div class="absolute inset-0 bg-black/60 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center p-6 gap-4 z-10">
                            
                            <!-- Botão: Visualizar todas fotos -->
                            <button onclick="abrirModal(${index})" class="w-[95%] sm:w-full max-w-[240px] bg-white text-gray-900 font-semibold py-2.5 sm:py-3 px-3 sm:px-4 rounded-xl shadow-lg hover:bg-gray-100 transition-all transform hover:scale-105 flex items-center justify-center gap-1.5 sm:gap-2 text-xs sm:text-sm">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 shrink-0 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                <span class="leading-tight">Visualizar todas fotos</span>
                            </button>

                            <!-- Botão: Falar com vendedor (Abre Nova Guia) -->
                            <a href="${linkWhats}" target="_blank" rel="noopener noreferrer" class="w-[95%] sm:w-full max-w-[240px] bg-[#25D366] hover:bg-[#1DA851] text-white font-semibold py-2.5 sm:py-3 px-3 sm:px-4 rounded-xl shadow-[0_0_15px_rgba(37,211,102,0.3)] hover:shadow-[0_0_20px_rgba(37,211,102,0.6)] transition-all transform hover:scale-105 flex items-center justify-center gap-1.5 sm:gap-2 text-xs sm:text-sm">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                                <span class="leading-tight">Falar com vendedor</span>
                            </a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==========================================
        // LÓGICA DO MODAL (CARROSSEL ESTILO INSTAGRAM)
        // ==========================================

        const modalOverlay = document.getElementById('modal-overlay');
        const imgModal = document.getElementById('modal-imagem');
        const btnWhatsModal = document.getElementById('modal-btn-whatsapp');
        const btnDetalhesModal = document.getElementById('modal-btn-detalhes');
        const contadorModal = document.getElementById('modal-contador');

        function abrirModal(index) {
            anuncioAtual = classificadosOrdenados[index];
            indiceImagemAtual = 1; // Sempre começa na foto 1 (image01.png)
            
            atualizarCarrossel();
            
            // Configura textos e links no modal
            btnWhatsModal.onclick = () => {
                window.open(gerarLinkWhatsapp(anuncioAtual.numero_whatsapp, anuncioAtual.nome_classificado, anuncioAtual.id_pasta), '_blank');
            };
            
            // Configura o link dinâmico para "Mais detalhes"
            btnDetalhesModal.href = `${BASE_URL_DETALHES}/${anuncioAtual.id_pasta}`;

            // Travar scroll da página de fundo e mostrar modal
            document.body.style.overflow = 'hidden';
            modalOverlay.classList.remove('modal-hidden');
            modalOverlay.classList.add('modal-visible');
        }

        function fecharModal() {
            // Destravar scroll e esconder modal
            document.body.style.overflow = 'auto';
            modalOverlay.classList.remove('modal-visible');
            modalOverlay.classList.add('modal-hidden');
            anuncioAtual = null;
            
            // Garante que os elementos voltam ao normal ao fechar
            alternarVisibilidadeUIModal(true);
        }

        function mudarImagem(direcao) {
            if (!anuncioAtual) return;

            // Lógica de avanço/recuo circular
            indiceImagemAtual += direcao;
            if (indiceImagemAtual > anuncioAtual.quantidade_fotos) {
                indiceImagemAtual = 1;
            } else if (indiceImagemAtual < 1) {
                indiceImagemAtual = anuncioAtual.quantidade_fotos;
            }

            atualizarCarrossel();
        }

        function atualizarCarrossel() {
            // Suavizar a transição da imagem
            imgModal.style.opacity = '0';
            
            setTimeout(() => {
                const url = obterUrlImagem(anuncioAtual.id_pasta, indiceImagemAtual);
                imgModal.src = url;
                
                // Fallback para preview caso a imagem real não exista (mesmo do card)
                imgModal.onerror = function() {
                    this.src = `https://images.unsplash.com/photo-1555661530-68c8e98db4e6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1080&q=80`;
                };

                imgModal.style.opacity = '1';
                contadorModal.innerText = `${indiceImagemAtual} / ${anuncioAtual.quantidade_fotos}`;
            }, 150); // Tempo pequeno para criar um fade-in fade-out bonito
        }

        // ==========================================
        // EFEITO INSTAGRAM: Esconder botões ao pressionar a imagem
        // ==========================================
        function alternarVisibilidadeUIModal(mostrar) {
            const elementosUI = document.querySelectorAll('.modal-ui');
            elementosUI.forEach(el => {
                el.style.opacity = mostrar ? '1' : '0';
                el.style.pointerEvents = mostrar ? 'auto' : 'none';
            });
        }

        // Mouse (Computador)
        imgModal.addEventListener('mousedown', () => alternarVisibilidadeUIModal(false));
        imgModal.addEventListener('mouseup', () => alternarVisibilidadeUIModal(true));
        imgModal.addEventListener('mouseleave', () => alternarVisibilidadeUIModal(true));

        // Toque (Celular)
        imgModal.addEventListener('touchstart', () => alternarVisibilidadeUIModal(false), {passive: true});
        imgModal.addEventListener('touchend', () => alternarVisibilidadeUIModal(true));
        imgModal.addEventListener('touchcancel', () => alternarVisibilidadeUIModal(true));

        // Fechar modal ao clicar fora do conteúdo
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                fecharModal();
            }
        });

        // Controle pelo teclado (Setas e Esc)
        document.addEventListener('keydown', (e) => {
            if (!modalOverlay.classList.contains('modal-hidden')) {
                if (e.key === 'Escape') fecharModal();
                if (e.key === 'ArrowRight') mudarImagem(1);
                if (e.key === 'ArrowLeft') mudarImagem(-1);
            }
        });

        // ==========================================
        // LÓGICA DAS NOTIFICAÇÕES (AVALIAÇÕES GOOGLE)
        // ==========================================
        
        // Array com as avaliações simuladas (Adicione as avaliações reais do seu perfil aqui para garantir o SEO e gatilho)
        const avaliacoesGoogle = [
            { nome: 'João Pedro', texto: 'Comprei meu veículo aqui, atendimento excelente! Muito transparente.' },
            { nome: 'Maria Silva', texto: 'Responderam super rápido no WhatsApp. Recomendo demais!' },
            { nome: 'Carlos Souza', texto: 'Anúncios muito claros e fáceis de ver as fotos. Gostei muito.' },
            { nome: 'Ana Costa', texto: 'Processo super seguro e direto com o vendedor, 5 estrelas!' },
            { nome: 'Roberto Alves', texto: 'Encontrei exatamente o que procurava. Sistema muito moderno.' }
        ];

        function mostrarNotificacaoAvaliacao() {
            const toast = document.getElementById('review-toast');
            // Pega uma avaliação aleatória da lista
            const avaliacao = avaliacoesGoogle[Math.floor(Math.random() * avaliacoesGoogle.length)];
            
            document.getElementById('toast-initial').innerText = avaliacao.nome.charAt(0);
            document.getElementById('toast-name').innerText = avaliacao.nome;
            document.getElementById('toast-text').innerText = avaliacao.texto;

            // Animação de entrada
            toast.classList.remove('translate-x-[120%]', 'opacity-0');
            toast.classList.add('translate-x-0', 'opacity-100');

            // Esconde após 6 segundos na tela
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-[120%]', 'opacity-0');
            }, 6000);
        }

        // Inicia o ciclo de notificações de Prova Social
        // Mostra a primeira após 5 segundos, depois continua a cada 60 segundos
        setTimeout(() => {
            mostrarNotificacaoAvaliacao();
            setInterval(mostrarNotificacaoAvaliacao, 60000);
        }, 5000);

        // ==========================================
        // SIMULADOR DE VISITAS EM TEMPO REAL
        // ==========================================
        setInterval(() => {
            classificadosOrdenados.forEach(anuncio => {
                // Existe 30% de chance de um classificado receber uma visita a cada 30 segundos
                if (Math.random() < 0.3) {
                    const storageKey = `views_${anuncio.id_pasta}`;
                    let currentViews = parseInt(localStorage.getItem(storageKey));
                    
                    // Aumenta de 1 a 2 visualizações
                    const increase = Math.floor(Math.random() * 2) + 1;
                    currentViews += increase;
                    
                    localStorage.setItem(storageKey, currentViews);
                    
                    const badge = document.getElementById(`view-count-${anuncio.id_pasta}`);
                    if (badge) {
                        badge.innerText = currentViews;
                        badge.classList.add('text-[#25D366]'); // Pisca na cor verde
                        setTimeout(() => badge.classList.remove('text-[#25D366]'), 500);
                    }
                }
            });
        }, 30000); // 30000ms = 30 segundos

    </script>
